{% extends "portal/public_base.html" %}
{% block content %}
<div class="auth-panel">
  <p class="eyebrow">受邀測試</p>
  <h1>登入 Brain Cloud</h1>
  {% if invalid %}
  <p class="auth-error" role="alert">這個連結已失效或已經使用過，請重新申請登入連結。</p>
  {% endif %}
  {% if sent %}
  <p class="auth-status" role="status">如果這個 email 已受邀，我們已經寄出登入連結，請到信箱查收。</p>
  {% else %}
  <p>輸入受邀的 email，我們會寄一個一次性登入連結給你。</p>
  <form method="post" action="{{ url_for('auth.login_request') }}" class="auth-form">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
    <button type="submit">寄送登入連結</button>
  </form>
  {% endif %}
</div>
{% endblock %}

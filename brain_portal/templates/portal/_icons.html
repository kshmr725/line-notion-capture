{% macro icon(name, label=None) -%}
<svg class="portal-icon" data-icon="{{ name }}"{% if label %} role="img" aria-label="{{ label }}"{% else %} aria-hidden="true"{% endif %} viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  {% if name == "grid" %}<rect x="3" y="3" width="5" height="5"/><rect x="12" y="3" width="5" height="5"/><rect x="3" y="12" width="5" height="5"/><rect x="12" y="12" width="5" height="5"/>
  {% elif name == "orbit" %}<circle cx="10" cy="10" r="2.25"/><ellipse cx="10" cy="10" rx="7" ry="3.75" transform="rotate(-30 10 10)"/><circle cx="15.9" cy="6.6" r="1"/>
  {% elif name == "map-pin" %}<path d="M16 8.25c0 4.5-6 8.75-6 8.75S4 12.75 4 8.25a6 6 0 1 1 12 0Z"/><circle cx="10" cy="8.25" r="2"/>
  {% elif name == "workflow" %}<circle cx="5" cy="5" r="2"/><circle cx="15" cy="5" r="2"/><circle cx="10" cy="15" r="2"/><path d="M6.5 6.4 8.8 13M13.5 6.4 11.2 13"/>
  {% elif name == "file-text" %}<path d="M6 2.5h5l3 3v12H6z"/><path d="M11 2.5v3h3M8.5 10h3M8.5 13h3"/>
  {% elif name == "layers" %}<path d="m10 2.5 7 4-7 4-7-4 7-4Z"/><path d="m3 10.5 7 4 7-4M3 14.5l7 4 7-4"/>
  {% elif name == "nodes" %}<circle cx="5" cy="5" r="2"/><circle cx="15" cy="5" r="2"/><circle cx="10" cy="15" r="2"/><path d="m6.6 6.2 2.1 6.5m4.7-6.5-2.1 6.5M7 5h6"/>
  {% elif name == "utensils" %}<path d="M5 2.5v6M3 2.5v3a2 2 0 0 0 4 0v-3M5 8.5v9M14 17.5V2.5c2.2.8 3 3.3 1.8 5.1L14 10"/>
  {% elif name == "coffee" %}<path d="M4 7h9v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7Z"/><path d="M13 9h1.5a2 2 0 0 1 0 4H13M6 3.5c0 1.25 1.25 1.25 1.25 2.5M9 3.5c0 1.25 1.25 1.25 1.25 2.5"/>
  {% elif name == "glass" %}<path d="M5 2.5h10L10 9v8M7 17h6M10 9 5 2.5"/>
  {% elif name == "cake" %}<path d="M4 9h12v8H4zM3 17h14M6 9V6a4 4 0 0 1 8 0v3M10 4V2"/>
  {% elif name == "wrench" %}<path d="M12.8 3.2a4 4 0 0 0-4.9 5L3 13.1a2.1 2.1 0 1 0 3 3L10.9 11a4 4 0 0 0 5-4.9l-2.6 2.1-2-2 1.5-3Z"/>
  {% elif name == "robot" %}<rect x="4" y="6" width="12" height="10" rx="2"/><path d="M10 3v3M7 10h.01M13 10h.01M7 13h6"/>
  {% elif name == "plug" %}<path d="M7 3v5M13 3v5M5 8h10v2a5 5 0 0 1-5 5v2M8 17h4"/>
  {% elif name == "branch" %}<circle cx="6" cy="4" r="2"/><circle cx="14" cy="4" r="2"/><circle cx="10" cy="16" r="2"/><path d="M6 6v3a4 4 0 0 0 4 4m4-7v3a4 4 0 0 1-4 4"/>
  {% elif name == "book" %}<path d="M4 3.5h5a2 2 0 0 1 2 2v11a2 2 0 0 0-2-2H4zM16 3.5h-5a2 2 0 0 0-2 2v11a2 2 0 0 1 2-2h5z"/>
  {% elif name == "newspaper" %}<path d="M3 4h12v12H5a2 2 0 0 1-2-2V4Z"/><path d="M15 7h2v9H5M6 7h5M6 10h5M6 13h3"/>
  {% else %}<circle cx="10" cy="10" r="7"/><path d="M7 10h6M10 7v6"/>{% endif %}
</svg>
{%- endmacro %}

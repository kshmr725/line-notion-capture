services:
  - type: web
    name: line-notion-capture
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        value: 1b8c5d8e33cc416ca86f75e04cb15c40
      - key: DATABASE_PATH
        value: data/line-notion-capture.sqlite3
      - key: DRY_RUN
        value: false

  - type: web
    name: brain-cloud-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn portal_app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORTAL_DATABASE_URL
        sync: false
      - key: PORTAL_DEV_AUTH
        value: false
      - key: PORTAL_SESSION_SECRET
        sync: false
      - key: PORTAL_SMTP_HOST
        sync: false
      - key: PORTAL_SMTP_USERNAME
        sync: false
      - key: PORTAL_SMTP_PASSWORD
        sync: false
      - key: PORTAL_SMTP_FROM_EMAIL
        sync: false
      - key: NOTION_OAUTH_CLIENT_ID
        sync: false
      - key: NOTION_OAUTH_CLIENT_SECRET
        sync: false
      - key: NOTION_OAUTH_REDIRECT_URL
        sync: false
      - key: PORTAL_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_WEBHOOK_SECRET
        sync: false
      - key: PORTAL_PROCESSOR_TOKEN
        sync: false

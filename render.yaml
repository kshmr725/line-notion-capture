services:
  - type: web
    name: line-notion-capture
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        value: 1b8c5d8e33cc416ca86f75e04cb15c40
      - key: DATABASE_PATH
        value: data/line-notion-capture.sqlite3
      - key: DRY_RUN
        value: false
